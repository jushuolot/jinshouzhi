<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LOT 世界核 · 免费链</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <style>
    :root {
      --bg: #050810;
      --panel: #0d1524;
      --line: #1e3a5f;
      --text: #e8f4ff;
      --muted: #7da8c8;
      --accent: #3dff9a;
      --warn: #ffb347;
      --nucleus: #ff6b9d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "SF Pro Text", "PingFang SC", system-ui, sans-serif;
      background: radial-gradient(ellipse at 50% 0%, #0a2840 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(5, 8, 16, 0.85);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 { font-size: 15px; margin: 0; font-weight: 600; letter-spacing: 0.04em; }
    .nucleus-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--nucleus);
      box-shadow: 0 0 12px var(--nucleus);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 50% { opacity: 0.5; transform: scale(0.85); } }
    .chain-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-left: auto; }
    .chain-pill {
      font-size: 10px; padding: 3px 8px; border-radius: 999px;
      border: 1px solid var(--line); color: var(--muted);
    }
    .chain-pill.on { border-color: var(--accent); color: var(--accent); }
    .chain-pill.off { opacity: 0.45; }
    main { display: grid; grid-template-columns: 280px 1fr 300px; min-height: calc(100vh - 48px); }
    @media (max-width: 960px) { main { grid-template-columns: 1fr; } aside { max-height: 240px; overflow: auto; } }
    aside, .quest {
      background: var(--panel);
      border-right: 1px solid var(--line);
      padding: 12px;
      overflow: auto;
    }
    .quest { border-right: none; border-left: 1px solid var(--line); }
    .sec-title {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--muted); margin: 0 0 8px;
    }
    .crumb { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; }
    .crumb button {
      background: transparent; border: 1px solid var(--line); color: var(--text);
      border-radius: 6px; padding: 4px 8px; font-size: 12px; cursor: pointer;
    }
    .crumb button.on { border-color: var(--accent); color: var(--accent); }
    .crumb span { color: var(--muted); align-self: center; font-size: 11px; }
    #map { height: 100%; min-height: 420px; background: #0a1628; }
    .lo-card {
      border: 1px solid var(--line); border-radius: 10px; padding: 10px;
      margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s;
    }
    .lo-card.active { border-color: var(--nucleus); box-shadow: 0 0 0 1px rgba(255,107,157,0.25); }
    .lo-id { font-size: 13px; font-weight: 600; color: var(--nucleus); }
    .lo-meta { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .progress { height: 4px; background: #1a2d44; border-radius: 2px; margin-top: 8px; overflow: hidden; }
    .progress i { display: block; height: 100%; background: linear-gradient(90deg, var(--nucleus), var(--accent)); }
    .actor-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .actor-row button {
      flex: 1; min-width: 70px; padding: 8px; border-radius: 8px;
      border: 1px solid var(--line); background: #111c2e; color: var(--text);
      font-size: 12px; cursor: pointer;
    }
    .actor-row button.on { border-color: var(--accent); background: #0f2a22; }
    .actions { display: flex; flex-direction: column; gap: 6px; }
    .actions button {
      padding: 10px; border-radius: 8px; border: none;
      background: linear-gradient(135deg, #1a4d3a, #0d3328);
      color: var(--accent); font-weight: 600; font-size: 12px; cursor: pointer;
    }
    .actions button:disabled { opacity: 0.35; cursor: not-allowed; }
    .evt {
      font-size: 11px; padding: 6px 0; border-bottom: 1px solid #152238;
      font-family: ui-monospace, monospace;
    }
    .evt b { color: var(--warn); }
    .integrity { font-size: 10px; margin-top: 8px; }
    .integrity.ok { color: var(--accent); }
    .integrity.bad { color: #ff6b6b; }
    .zoom-hint { font-size: 11px; color: var(--muted); line-height: 1.5; margin-bottom: 10px; }
    .legacy-link { font-size: 11px; margin-top: 12px; }
    .legacy-link a { color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <div class="nucleus-dot" title="LO 原子核"></div>
    <h1>LOT 世界核 · 免费资源链</h1>
    <div class="chain-pills" id="chain-pills"></div>
  </header>
  <main>
    <aside>
      <p class="sec-title">空间 zoom · 宇宙 → 乡村</p>
      <div class="crumb" id="spatial-crumb"></div>
      <p class="zoom-hint" id="zoom-hint">点击面包屑逐级 zoom；地图上的节点可点。数据存在本机 IndexedDB，哈希链防篡改。</p>
      <p class="sec-title">任务核（LO）</p>
      <div id="lo-list"></div>
      <p class="legacy-link"><a href="../index.html">← 旧版演示壳</a></p>
    </aside>
    <section id="map" aria-label="世界地图"></section>
    <div class="quest">
      <p class="sec-title">角色镜头</p>
      <div class="actor-row" id="actors"></div>
      <p class="sec-title">动作 · 写入事件链</p>
      <div class="actions" id="actions"></div>
      <p class="sec-title" style="margin-top:16px">轨道电子 · 事件账本</p>
      <div id="event-log"></div>
      <p class="integrity ok" id="integrity"></p>
    </div>
  </main>
  <script type="module">
    import { defaultChain } from '../kernel/lot-chain.js';
    import { projectLOState, ACTOR_LENSES, SPATIAL_LEVELS } from '../kernel/lot-nucleus.js';

    const state = {
      chain: defaultChain,
      focusCellId: 'beijing',
      activeLoId: null,
      actor: 'driver',
      map: null,
      markers: [],
      lang: 'zh',
    };

    const ACTION_TABLE = {
      driver: [
        { code: 'PICKUP_DONE', label: '揽收完成', cell: 'origin' },
        { code: 'IN_TRANSIT', label: '在途', cell: null },
        { code: 'POD_SIGNED', label: '签收', cell: 'dest' },
      ],
      warehouse: [
        { code: 'INBOUND_SCAN', label: '入库扫码', cell: 'facility' },
        { code: 'PICK_PACK', label: '拣配', cell: 'facility' },
        { code: 'LOADED', label: '装车', cell: 'facility' },
      ],
      dispatcher: [
        { code: 'DISPATCH', label: '派车', cell: null },
        { code: 'REPLAN', label: '重算路线', cell: null },
      ],
      shipper: [{ code: 'CONFIRM', label: '货主确认', cell: 'origin' }],
    };

    function label(cell) {
      return state.lang === 'en' ? (cell.labelEn || cell.id) : (cell.labelZh || cell.id);
    }

    function renderChainPills(status) {
      document.getElementById('chain-pills').innerHTML = status
        .map((s) => `<span class="chain-pill ${s.ok ? 'on' : 'off'}" title="${s.label}">${s.id}</span>`)
        .join('');
    }

    async function buildCrumb() {
      const all = await state.chain.listSpatial();
      const map = new Map(all.map((c) => [c.id, c]));
      const path = [];
      let cur = map.get(state.focusCellId);
      while (cur) {
        path.unshift(cur);
        cur = cur.parentId ? map.get(cur.parentId) : null;
      }
      const el = document.getElementById('spatial-crumb');
      el.innerHTML = path
        .map((c, i) => {
          const sep = i ? '<span>›</span>' : '';
          const on = c.id === state.focusCellId ? ' on' : '';
          return `${sep}<button type="button" data-cell="${c.id}" class="${on.trim()}">${label(c)}</button>`;
        })
        .join('');
      el.querySelectorAll('button').forEach((btn) => {
        btn.onclick = () => {
          state.focusCellId = btn.dataset.cell;
          renderAll();
        };
      });
      const focus = map.get(state.focusCellId);
      const lvl = focus ? SPATIAL_LEVELS.indexOf(focus.level) + 1 : 0;
      document.getElementById('zoom-hint').textContent =
        `当前层级 ${lvl}/${SPATIAL_LEVELS.length}（${focus?.level || '—'}）。` +
        ' 点击面包屑 zoom；事件 SHA-256 哈希链串联，本地 IndexedDB 零云费。';
    }

    function ensureMap() {
      if (state.map) return;
      state.map = L.map('map', { zoomControl: true, attributionControl: true });
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        subdomains: 'abcd',
        maxZoom: 19,
        attribution: '&copy; OSM &copy; CARTO',
      }).addTo(state.map);
    }

    async function renderMap() {
      ensureMap();
      state.markers.forEach((m) => state.map.removeLayer(m));
      state.markers = [];
      const all = await state.chain.listSpatial();
      const focus = all.find((c) => c.id === state.focusCellId);
      const children = all.filter((c) => c.parentId === state.focusCellId);
      const points = children.filter((c) => c.lat != null).concat(focus?.lat != null ? [focus] : []);
      for (const c of all.filter((x) => x.lat != null)) {
        const isFocus = c.id === state.focusCellId;
        const isChild = c.parentId === state.focusCellId;
        if (!isFocus && !isChild && focus?.level !== 'universe' && focus?.level !== 'planet') continue;
        const m = L.circleMarker([c.lat, c.lng], {
          radius: isFocus ? 12 : 8,
          color: isFocus ? '#ff6b9d' : '#3dff9a',
          fillColor: isFocus ? '#ff6b9d' : '#1a4d3a',
          fillOpacity: 0.85,
          weight: 2,
        }).addTo(state.map);
        m.bindPopup(`<b>${label(c)}</b><br/><small>${c.level}</small>`);
        m.on('click', () => {
          state.focusCellId = c.id;
          renderAll();
        });
        state.markers.push(m);
      }
      if (points.length) {
        const bounds = L.latLngBounds(points.map((p) => [p.lat, p.lng]));
        state.map.fitBounds(bounds.pad(0.35));
      } else if (focus?.lat) {
        state.map.setView([focus.lat, focus.lng], focus.level === 'nation' ? 5 : 10);
      } else {
        state.map.setView([20, 0], 2);
      }
      setTimeout(() => state.map.invalidateSize(), 50);
    }

    async function renderLOs() {
      const los = await state.chain.listLOs();
      if (!state.activeLoId && los.length) state.activeLoId = los[0].loId;
      const html = [];
      for (const lo of los) {
        const events = await state.chain.getEvents(lo.loId);
        const proj = projectLOState(lo, events);
        const active = lo.loId === state.activeLoId ? ' active' : '';
        html.push(
          `<div class="lo-card${active}" data-lo="${lo.loId}">` +
            `<div class="lo-id">${lo.loId}</div>` +
            `<div class="lo-meta">${lo.channel} · ${lo.originCellId} → ${lo.destCellId}</div>` +
            `<div class="progress"><i style="width:${proj.progress}%"></i></div>` +
            `</div>`
        );
      }
      const el = document.getElementById('lo-list');
      el.innerHTML = html.join('') || '<p class="lo-meta">无 LO</p>';
      el.querySelectorAll('.lo-card').forEach((card) => {
        card.onclick = () => {
          state.activeLoId = card.dataset.lo;
          renderAll();
        };
      });
    }

    function renderActors() {
      const el = document.getElementById('actors');
      el.innerHTML = Object.values(ACTOR_LENSES)
        .filter((a) => a.id !== 'all')
        .map(
          (a) =>
            `<button type="button" data-actor="${a.id}" class="${a.id === state.actor ? 'on' : ''}">` +
            (state.lang === 'en' ? a.labelEn : a.labelZh) +
            '</button>'
        )
        .join('');
      el.querySelectorAll('button').forEach((btn) => {
        btn.onclick = () => {
          state.actor = btn.dataset.actor;
          renderActions();
          renderActors();
        };
      });
    }

    async function renderActions() {
      const lo = state.activeLoId ? await state.chain.getLO(state.activeLoId) : null;
      const acts = ACTION_TABLE[state.actor] || [];
      const el = document.getElementById('actions');
      el.innerHTML = acts
        .map(
          (a) =>
            `<button type="button" data-code="${a.code}" data-cell="${a.cell || ''}" ${lo ? '' : 'disabled'}>` +
            a.label +
            '</button>'
        )
        .join('');
      el.querySelectorAll('button').forEach((btn) => {
        btn.onclick = async () => {
          if (!state.activeLoId) return;
          const lo = await state.chain.getLO(state.activeLoId);
          let cellId = state.focusCellId;
          if (btn.dataset.cell === 'origin') cellId = lo.originCellId;
          if (btn.dataset.cell === 'dest') cellId = lo.destCellId;
          if (btn.dataset.cell === 'facility') cellId = lo.destCellId;
          await state.chain.emitAction(state.activeLoId, {
            code: btn.dataset.code,
            actor: state.actor,
            spatialCellId: cellId,
            payload: { focusCell: state.focusCellId },
          });
          await renderAll();
        };
      });
    }

    async function renderEvents() {
      if (!state.activeLoId) {
        document.getElementById('event-log').innerHTML = '';
        document.getElementById('integrity').textContent = '';
        return;
      }
      const events = await state.chain.getEvents(state.activeLoId);
      const lo = await state.chain.getLO(state.activeLoId);
      const proj = projectLOState(lo, events);
      document.getElementById('event-log').innerHTML = events
        .map(
          (e) =>
            `<div class="evt"><b>#${e.seq}</b> ${e.code} <span style="color:#7da8c8">@${e.actor}</span><br/>` +
            `<span style="color:#5a7a96">${e.hash.slice(0, 16)}…</span></div>`
        )
        .join('');
      const ig = document.getElementById('integrity');
      ig.className = 'integrity ' + (proj.integrity.ok ? 'ok' : 'bad');
      ig.textContent = proj.integrity.ok
        ? `哈希链完整 · ${events.length} 个轨道电子`
        : `链断裂 @#${proj.integrity.brokenAt}: ${proj.integrity.reason}`;
    }

    async function renderAll() {
      await buildCrumb();
      await renderMap();
      await renderLOs();
      renderActors();
      await renderActions();
      await renderEvents();
    }

    const status = await state.chain.init();
    renderChainPills(status);
    await renderAll();
  </script>
</body>
</html>
