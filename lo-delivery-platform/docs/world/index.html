<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LOT 世界 · 全链可视</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <style>
    :root {
      --bg: #030508;
      --panel: rgba(8, 14, 28, 0.92);
      --line: #1a3a5c;
      --text: #eef8ff;
      --muted: #6d9ab8;
      --accent: #3dffb0;
      --gold: #ffc14d;
      --nucleus: #ff5c9a;
      --glow: rgba(61, 255, 176, 0.35);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; }
    body {
      font-family: "PingFang SC", "SF Pro Display", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* —— 开场：宇宙 → 地球 —— */
    #intro {
      position: fixed; inset: 0; z-index: 9999;
      background: radial-gradient(ellipse at 50% 40%, #0a1a30 0%, #020408 70%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 0.8s, visibility 0.8s;
    }
    #intro.hide { opacity: 0; visibility: hidden; pointer-events: none; }
    .stars { position: absolute; inset: 0; overflow: hidden; }
    .stars i {
      position: absolute; width: 2px; height: 2px; background: #fff; border-radius: 50%;
      animation: twinkle 3s ease-in-out infinite;
    }
    @keyframes twinkle { 50% { opacity: 0.2; } }
    .intro-earth {
      width: 120px; height: 120px; border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #4af, #1a5a8a 45%, #0a2840 100%);
      box-shadow: 0 0 60px rgba(74, 170, 255, 0.5), inset -10px -10px 30px rgba(0,0,0,0.4);
      animation: earthIn 2s ease-out forwards, float 4s ease-in-out 2s infinite;
      transform: scale(0);
    }
    @keyframes earthIn { to { transform: scale(1); } }
    @keyframes float { 50% { transform: translateY(-8px) scale(1.02); } }
    #intro h1 {
      margin: 28px 0 8px; font-size: 22px; font-weight: 700; letter-spacing: 0.2em;
      text-align: center; z-index: 1;
    }
    #intro p { color: var(--muted); font-size: 13px; margin: 0 0 24px; z-index: 1; text-align: center; max-width: 320px; line-height: 1.6; }
    #intro button {
      z-index: 1; padding: 14px 36px; border: none; border-radius: 999px; cursor: pointer;
      background: linear-gradient(135deg, #1a6b4a, #0d3d2a); color: var(--accent);
      font-size: 15px; font-weight: 700; letter-spacing: 0.08em;
      box-shadow: 0 0 24px var(--glow);
    }

    /* —— 主布局 —— */
    #app { display: grid; grid-template-rows: auto 1fr auto; height: 100vh; }
    header {
      display: flex; align-items: center; gap: 10px; padding: 8px 14px;
      background: var(--panel); border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px); z-index: 500;
    }
    .logo-dot {
      width: 9px; height: 9px; border-radius: 50%; background: var(--nucleus);
      box-shadow: 0 0 10px var(--nucleus); animation: pulse 2s infinite;
    }
    @keyframes pulse { 50% { opacity: 0.4; } }
    header h1 { font-size: 14px; margin: 0; font-weight: 600; }
    .hud { display: flex; gap: 16px; margin-left: auto; font-size: 11px; color: var(--muted); }
    .hud b { color: var(--accent); font-size: 13px; }
    .hud-warn b { color: var(--gold); }
    .toolbar { display: flex; gap: 6px; margin-left: 12px; }
    .toolbar button {
      padding: 6px 12px; border-radius: 8px; border: 1px solid var(--line);
      background: #0f1a2e; color: var(--text); font-size: 11px; cursor: pointer;
    }
    .toolbar button.primary { border-color: var(--accent); color: var(--accent); background: #0a2a1e; }
    .toolbar button:disabled { opacity: 0.4; cursor: wait; }

    .stage-wrap { position: relative; min-height: 0; }
    #map { position: absolute; inset: 0; background: #061018; }
    .map-overlay {
      position: absolute; top: 12px; left: 12px; z-index: 400;
      background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
      padding: 10px 12px; max-width: 260px; backdrop-filter: blur(8px);
    }
    .map-overlay .sec { font-size: 9px; letter-spacing: 0.15em; color: var(--muted); margin-bottom: 6px; }
    .crumb { display: flex; flex-wrap: wrap; gap: 4px; }
    .crumb button {
      padding: 3px 8px; border-radius: 6px; border: 1px solid var(--line);
      background: transparent; color: var(--text); font-size: 11px; cursor: pointer;
    }
    .crumb button.on { border-color: var(--accent); color: var(--accent); }
    .crumb span { color: var(--muted); font-size: 10px; align-self: center; }

    .event-panel {
      position: absolute; top: 12px; right: 12px; bottom: 12px; width: 300px; z-index: 400;
      background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
      display: flex; flex-direction: column; backdrop-filter: blur(8px);
    }
    .event-panel h3 { margin: 0; padding: 10px 12px; font-size: 11px; color: var(--muted); border-bottom: 1px solid var(--line); }
    #event-stream { flex: 1; overflow: auto; padding: 8px 12px; font-family: ui-monospace, monospace; font-size: 10px; }
    .evt-row { padding: 5px 0; border-bottom: 1px solid #152238; animation: evtIn 0.35s ease; }
    @keyframes evtIn { from { opacity: 0; transform: translateX(8px); } }
    .evt-row b { color: var(--gold); }
    .evt-sync { color: var(--nucleus); }

    .domain-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .domain-tabs button {
      padding: 6px 12px; border-radius: 8px; border: 1px solid var(--line);
      background: #0a1422; color: var(--muted); font-size: 11px; cursor: pointer;
    }
    .domain-tabs button.on { color: var(--text); font-weight: 600; }
    .domain-tabs button[data-d="procurement"].on { border-color: #5eb8ff; color: #5eb8ff; }
    .domain-tabs button[data-d="sales"].on { border-color: var(--accent); color: var(--accent); }
    .domain-tabs button[data-d="production"].on { border-color: var(--gold); color: var(--gold); }
    .domain-tabs button[data-d="reverse"].on { border-color: #ff7eb3; color: #ff7eb3; }
    .domain-tabs button[data-d="ecommerce"].on { border-color: #a78bfa; color: #a78bfa; }
    .domain-tabs button[data-d="express"].on { border-color: #38bdf8; color: #38bdf8; }
    .domain-tabs button[data-d="linehaul"].on { border-color: #fb923c; color: #fb923c; }
    .domain-tabs button[data-d="all"].on { border-color: var(--nucleus); color: var(--nucleus); }
    .domain-desc { font-size: 10px; color: var(--muted); margin-bottom: 8px; line-height: 1.5; }
    #lo-list { max-height: 140px; overflow: auto; margin-bottom: 8px; border-bottom: 1px solid var(--line); padding-bottom: 6px; }
    .lo-row {
      padding: 5px 6px; border-radius: 6px; font-size: 10px; cursor: pointer; margin-bottom: 3px;
      border: 1px solid transparent;
    }
    .lo-row:hover { background: #0f1a2e; }
    .lo-row.on { border-color: var(--nucleus); background: #1a1020; }
    .lo-row .id { font-weight: 600; color: var(--gold); }
    .lo-row .cargo { color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #stage-check { padding: 8px 12px; border-bottom: 1px solid var(--line); max-height: 160px; overflow: auto; }
    .st { display: flex; gap: 6px; align-items: flex-start; font-size: 10px; padding: 3px 0; }
    .st i { font-style: normal; width: 14px; }
    .st.done { color: var(--accent); }
    .st.pending { color: #3a5068; }
    .hud-domains { font-size: 10px; color: var(--muted); }

    /* —— 全链管道 —— */
    #pipeline {
      background: var(--panel); border-top: 1px solid var(--line);
      padding: 10px 16px 14px; backdrop-filter: blur(12px); z-index: 500;
    }
    .pipe-title { font-size: 9px; letter-spacing: 0.18em; color: var(--muted); margin-bottom: 10px; }
    .pipe-track { display: flex; align-items: stretch; gap: 0; position: relative; }
    .pipe-node {
      flex: 1; text-align: center; padding: 10px 6px; border-radius: 10px;
      border: 1px solid var(--line); background: #0a1422; position: relative;
      transition: border-color 0.3s, box-shadow 0.3s, transform 0.3s;
      cursor: pointer; min-width: 0;
    }
    .pipe-node + .pipe-node { margin-left: -1px; border-top-left-radius: 0; border-bottom-left-radius: 0; }
    .pipe-node:not(:last-child) { border-top-right-radius: 0; border-bottom-right-radius: 0; }
    .pipe-node.active {
      border-color: var(--accent); box-shadow: 0 0 20px var(--glow); transform: translateY(-3px); z-index: 2;
    }
    .pipe-node.done { border-color: #2a6b4a; opacity: 0.85; }
    .pipe-node .icon { font-size: 22px; display: block; margin-bottom: 4px; }
    .pipe-node .name { font-size: 11px; font-weight: 600; }
    .pipe-node .sub { font-size: 9px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pipe-bar { height: 3px; background: #1a2d44; border-radius: 2px; margin-top: 6px; overflow: hidden; }
    .pipe-bar i { display: block; height: 100%; background: linear-gradient(90deg, var(--nucleus), var(--accent)); transition: width 0.5s; }
    .pipe-connector {
      position: absolute; top: 50%; height: 2px; background: linear-gradient(90deg, var(--line), var(--accent));
      transform: translateY(-50%); z-index: 0; pointer-events: none;
    }

    #toast {
      position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: rgba(10, 30, 22, 0.95); border: 1px solid var(--accent); color: var(--accent);
      padding: 12px 20px; border-radius: 12px; font-size: 13px; z-index: 8000;
      opacity: 0; transition: opacity 0.3s, transform 0.3s; pointer-events: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5); max-width: 90vw; text-align: center;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .finish-banner {
      position: fixed; inset: 0; z-index: 9000; background: rgba(2, 4, 8, 0.88);
      display: none; align-items: center; justify-content: center; flex-direction: column;
    }
    .finish-banner.show { display: flex; }
    .finish-banner h2 { font-size: 28px; margin: 0 0 8px; color: var(--accent); }
    .finish-banner p { color: var(--muted); margin: 0 0 20px; }
    .finish-banner button {
      padding: 12px 28px; border-radius: 999px; border: none; cursor: pointer;
      background: linear-gradient(135deg, #1a6b4a, #0d3d2a); color: var(--accent); font-weight: 700;
    }

    @media (max-width: 900px) {
      .event-panel { width: 200px; font-size: 9px; }
      .hud { display: none; }
    }
    @media (max-width: 640px) {
      .event-panel { display: none; }
      .pipe-node .sub { display: none; }
    }
  </style>
</head>
<body>
  <div id="intro">
    <div class="stars" id="stars"></div>
    <div class="intro-earth" aria-hidden="true"></div>
    <h1>LOT · 从宇宙到乡村</h1>
    <p>采购 · 销售 · 生产 · 逆向 · 电商 · 快递 · 干线 — 60+ 演示订单，全环节哈希事件链。零 API 费用。</p>
    <button type="button" id="btn-enter">进入世界</button>
  </div>

  <div id="app" hidden>
    <header>
      <div class="logo-dot"></div>
      <h1>LOT 全球一盘棋</h1>
      <div class="toolbar">
        <button type="button" class="primary" id="btn-play">▶ 播放全链</button>
        <button type="button" id="btn-reset">↺ 重置</button>
        <a href="driver.html" style="text-decoration:none"><button type="button">📱 司机端</button></a>
      </div>
      <div class="hud">
        <span>链环 <b id="hud-chain">—</b></span>
        <span>订单 <b id="hud-los">—</b></span>
        <span class="hud-domains" id="hud-domains">—</span>
        <span class="hud-warn">事件 <b id="hud-events">—</b></span>
      </div>
    </header>

    <div class="stage-wrap">
      <div id="map"></div>
      <div class="map-overlay">
        <div class="sec">ZOOM · 宇宙 → 乡村</div>
        <div class="crumb" id="spatial-crumb"></div>
      </div>
      <aside class="event-panel">
        <h3 id="panel-title">七大物流域 · 演示订单</h3>
        <div id="lo-list"></div>
        <div id="stage-check"></div>
        <h3 style="border-top:1px solid var(--line)">轨道电子 · 事件流</h3>
        <div id="event-stream"></div>
      </aside>
    </div>

    <footer id="pipeline">
      <div class="domain-tabs" id="domain-tabs"></div>
      <div class="domain-desc" id="domain-desc"></div>
      <div class="pipe-title">销售链演示管道（播放全链）· 点击聚焦</div>
      <div class="pipe-track" id="pipe-track"></div>
    </footer>
  </div>

  <div id="toast"></div>
  <div class="finish-banner" id="finish">
    <h2>全链通关</h2>
    <p>农户揽收 → 仓 → 干线 → 末端 · 哈希链完整 · 数据零云费</p>
    <button type="button" id="btn-finish-ok">再看一遍</button>
  </div>

  <script type="module">
    import { defaultChain } from '../kernel/lot-chain.js';
    import { getPipelineState, runFullDemo, ROUTE_COORDS } from '../kernel/lot-sim.js';
    import { projectLOState } from '../kernel/lot-nucleus.js';
    import { LOGISTICS_DOMAINS } from '../kernel/lot-domains.js';
    import { countByDomain } from '../kernel/lot-demo-data.js';

    const DOMAIN_COLORS = {
      procurement: '#5eb8ff',
      sales: '#3dffb0',
      production: '#ffc14d',
      reverse: '#ff7eb3',
      ecommerce: '#a78bfa',
      express: '#38bdf8',
      linehaul: '#fb923c',
    };

    const state = {
      chain: defaultChain,
      focusCellId: 'beijing',
      activeLoId: 'LO-ECM-001',
      domainFilter: 'all',
      map: null,
      layers: { markers: [], route: null, cargo: null },
      demoRunning: false,
      allEvents: [],
    };

    function stars() {
      const el = document.getElementById('stars');
      for (let i = 0; i < 80; i++) {
        const s = document.createElement('i');
        s.style.left = Math.random() * 100 + '%';
        s.style.top = Math.random() * 100 + '%';
        s.style.animationDelay = Math.random() * 3 + 's';
        el.appendChild(s);
      }
    }

    function toast(msg, ms = 2200) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toast._t);
      toast._t = setTimeout(() => t.classList.remove('show'), ms);
    }

    function ensureMap() {
      if (state.map) return;
      state.map = L.map('map', { zoomControl: true, attributionControl: true });
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        subdomains: 'abcd', maxZoom: 19, attribution: '&copy; OSM &copy; CARTO',
      }).addTo(state.map);
      const latlngs = ROUTE_COORDS.map((c) => [c[1], c[2]]);
      state.layers.route = L.polyline(latlngs, {
        color: '#3dffb0', weight: 4, opacity: 0.7, dashArray: '12 8',
      }).addTo(state.map);
      state.layers.cargo = L.circleMarker(latlngs[0], {
        radius: 10, color: '#ffc14d', fillColor: '#ffc14d', fillOpacity: 1, weight: 2,
      }).addTo(state.map);
      state.map.fitBounds(L.latLngBounds(latlngs).pad(0.2));
    }

    async function renderMap() {
      ensureMap();
      state.layers.markers.forEach((m) => state.map.removeLayer(m));
      state.layers.markers = [];
      const spatial = await state.chain.listSpatial();
      const los = await filteredLos();
      const labels = new Map(spatial.map((c) => [c.id, c.labelZh || c.id]));

      for (const lo of los) {
        for (const cellId of [lo.originCellId, lo.destCellId]) {
          const c = spatial.find((x) => x.id === cellId);
          if (!c?.lat) continue;
          const dom = lo.logisticsDomain || 'sales';
          const col = DOMAIN_COLORS[dom] || '#3dffb0';
          const m = L.circleMarker([c.lat, c.lng], {
            radius: lo.loId === state.activeLoId ? 11 : 5,
            color: lo.loId === state.activeLoId ? '#ff5c9a' : col,
            fillColor: lo.loId === state.activeLoId ? '#ff5c9a' : col,
            fillOpacity: lo.loId === state.activeLoId ? 1 : 0.55, weight: 2,
          }).addTo(state.map);
          const cargo = lo.contract?.cargo || lo.channel;
          m.bindPopup(`<b>${labels.get(cellId)}</b><br/>${cargo}<br/><small>${lo.loId}</small>`);
          m.on('click', () => { state.activeLoId = lo.loId; state.focusCellId = cellId; renderAll(); });
          state.layers.markers.push(m);
        }
      }

      const pipe = await getPipelineState(state.chain);
      const active = pipe.stages[pipe.activeIx];
      if (active?.lo && state.layers.cargo) {
        const c = spatial.find((x) => x.id === active.lo.originCellId);
        if (c?.lat) state.layers.cargo.setLatLng([c.lat, c.lng]);
      }
    }

    async function renderCrumb() {
      const all = await state.chain.listSpatial();
      const map = new Map(all.map((c) => [c.id, c]));
      const path = [];
      let cur = map.get(state.focusCellId);
      while (cur) { path.unshift(cur); cur = cur.parentId ? map.get(cur.parentId) : null; }
      document.getElementById('spatial-crumb').innerHTML = path.map((c, i) => {
        const sep = i ? '<span>›</span>' : '';
        const on = c.id === state.focusCellId ? ' on' : '';
        return `${sep}<button type="button" data-cell="${c.id}" class="${on.trim()}">${c.labelZh}</button>`;
      }).join('');
      document.querySelectorAll('#spatial-crumb button').forEach((btn) => {
        btn.onclick = () => { state.focusCellId = btn.dataset.cell; renderMap(); };
      });
    }

    async function renderPipeline() {
      const pipe = await getPipelineState(state.chain);
      const track = document.getElementById('pipe-track');
      track.innerHTML = pipe.stages.map((s, i) => {
        const cls = s.status === 'done' ? 'done' : s.loId === state.activeLoId || i === pipe.activeIx ? 'active' : '';
        return `<div class="pipe-node ${cls}" data-lo="${s.loId}" data-ix="${i}">
          <span class="icon">${s.icon}</span>
          <span class="name">${s.labelZh}</span>
          <span class="sub">${s.lastCode || '待启动'} · ${s.loId}</span>
          <div class="pipe-bar"><i style="width:${s.progress}%"></i></div>
        </div>`;
      }).join('');
      track.querySelectorAll('.pipe-node').forEach((node) => {
        node.onclick = () => {
          state.activeLoId = node.dataset.lo;
          const lo = pipe.stages[+node.dataset.ix]?.lo;
          if (lo) state.focusCellId = lo.originCellId;
          renderAll();
        };
      });

      const allLos = await state.chain.listLOs();
      const counts = countByDomain(allLos);
      document.getElementById('hud-los').textContent = allLos.length;
      document.getElementById('hud-domains').textContent =
        `采${counts.procurement} 销${counts.sales} 产${counts.production} 逆${counts.reverse} ` +
        `电${counts.ecommerce} 快${counts.express} 干${counts.linehaul}`;
    }

    async function filteredLos() {
      if (state.domainFilter === 'all') return state.chain.listLOs();
      return state.chain.listLOs({ domain: state.domainFilter });
    }

    function renderDomainTabs() {
      const tabs = [{ id: 'all', icon: '🌐', labelZh: '全部' }, ...Object.values(LOGISTICS_DOMAINS)];
      document.getElementById('domain-tabs').innerHTML = tabs
        .map((d) => {
          const id = d.id;
          const on = state.domainFilter === id ? ' on' : '';
          const label = d.icon ? `${d.icon} ${d.labelZh}` : d.labelZh;
          return `<button type="button" data-d="${id}" class="${on.trim()}">${label}</button>`;
        })
        .join('');
      document.querySelectorAll('#domain-tabs button').forEach((btn) => {
        btn.onclick = () => {
          state.domainFilter = btn.dataset.d;
          if (state.domainFilter !== 'all' && state.domainFilter !== 'sales') {
            filteredLos().then((los) => {
              if (los.length && !los.find((l) => l.loId === state.activeLoId)) state.activeLoId = los[0].loId;
              renderAll();
            });
          } else renderAll();
        };
      });
      const dom = LOGISTICS_DOMAINS[state.domainFilter];
      document.getElementById('domain-desc').textContent = dom
        ? dom.descZh
        : `共 ${document.getElementById('hud-los').textContent || '—'} 条演示 LO，覆盖七大物流域全要素`;
    }

    async function renderLoList() {
      const los = await filteredLos();
      const spatial = await state.chain.listSpatial();
      const label = (id) => spatial.find((c) => c.id === id)?.labelZh || id;
      document.getElementById('lo-list').innerHTML = los
        .map((lo) => {
          const on = lo.loId === state.activeLoId ? ' on' : '';
          const cargo = lo.contract?.cargo || lo.channel;
          const dom = LOGISTICS_DOMAINS[lo.logisticsDomain];
          const icon = dom?.icon || '·';
          return `<div class="lo-row${on}" data-lo="${lo.loId}">
            <div class="id">${icon} ${lo.loId}</div>
            <div class="cargo">${cargo} · ${label(lo.originCellId)}→${label(lo.destCellId)}</div>
          </div>`;
        })
        .join('');
      document.querySelectorAll('.lo-row').forEach((row) => {
        row.onclick = () => {
          state.activeLoId = row.dataset.lo;
          renderAll();
        };
      });
      const dom = LOGISTICS_DOMAINS[state.domainFilter];
      document.getElementById('panel-title').textContent = dom
        ? `${dom.icon} ${dom.labelZh} · ${los.length} 单`
        : `七大物流域 · ${los.length} 单`;
    }

    async function renderStageCheck() {
      const lo = state.activeLoId ? await state.chain.getLO(state.activeLoId) : null;
      const el = document.getElementById('stage-check');
      if (!lo) { el.innerHTML = ''; return; }
      const domain = lo.logisticsDomain;
      const def = LOGISTICS_DOMAINS[domain];
      if (!def) { el.innerHTML = '<div class="st">销售链四段演示 · 点播放全链</div>'; return; }
      const events = await state.chain.getEvents(lo.loId);
      const codes = new Set(events.filter((e) => e.type === 'FACT').map((e) => e.code));
      el.innerHTML = def.stages
        .map((st) => {
          const done = codes.has(st.code);
          return `<div class="st ${done ? 'done' : 'pending'}"><i>${done ? '✓' : '○'}</i>
            <span>${st.labelZh} <span style="color:#5a7a96">@${st.actor}</span>
            ${st.evidence ? `<br/><span style="font-size:9px;color:#4a6a82">证据: ${st.evidence.join(', ')}</span>` : ''}</span></div>`;
        })
        .join('');
    }

    async function renderEventStream() {
      const los = await filteredLos();
      const rows = [];
      for (const lo of los) {
        const evts = await state.chain.getEvents(lo.loId);
        for (const e of evts) rows.push({ ...e, loId: lo.loId });
      }
      rows.sort((a, b) => (a.ts || '').localeCompare(b.ts || ''));
      state.allEvents = rows;
      document.getElementById('hud-events').textContent = rows.length;
      const tail = rows.slice(-20).reverse();
      document.getElementById('event-stream').innerHTML = tail.map((e) => {
        const sync = e.type === 'SYNC' ? ' evt-sync' : '';
        return `<div class="evt-row${sync}"><b>${e.loId}</b> #${e.seq} ${e.code}<br/><span style="color:#5a7a96">${(e.hash || '').slice(0, 12)}…</span></div>`;
      }).join('');
    }

    function renderHudChain(status) {
      const on = (status || []).filter((s) => s.ok).length;
      document.getElementById('hud-chain').textContent = on + '/' + (status || []).length;
    }

    async function renderAll() {
      renderDomainTabs();
      await renderCrumb();
      await renderLoList();
      await renderStageCheck();
      await renderMap();
      await renderPipeline();
      await renderEventStream();
    }

    async function playDemo() {
      if (state.demoRunning) return;
      state.demoRunning = true;
      document.getElementById('btn-play').disabled = true;
      state.activeLoId = 'LO-FARM-001';
      await runFullDemo(state.chain, {
        delayMs: 1200,
        onStep: async (step, i, total) => {
          state.activeLoId = step.loId;
          toast(step.msg);
          await renderAll();
          const frac = i / (total - 1);
          const idx = Math.min(ROUTE_COORDS.length - 1, Math.floor(frac * (ROUTE_COORDS.length - 1)));
          const pt = ROUTE_COORDS[idx];
          if (state.layers.cargo) state.layers.cargo.setLatLng([pt[1], pt[2]]);
        },
      });
      state.demoRunning = false;
      document.getElementById('btn-play').disabled = false;
      document.getElementById('finish').classList.add('show');
      await renderAll();
    }

    async function enterWorld() {
      document.getElementById('intro').classList.add('hide');
      document.getElementById('app').hidden = false;
      setTimeout(() => state.map?.invalidateSize(), 100);
      await renderAll();
    }

    stars();
    const status = await state.chain.init();
    renderHudChain(status);

    document.getElementById('btn-enter').onclick = enterWorld;
    document.getElementById('btn-play').onclick = () => playDemo();
    document.getElementById('btn-reset').onclick = async () => {
      if (!confirm('清空本机演示数据并重新开始？')) return;
      await state.chain.resetDemo();
      toast('已重置 · 重新裂变种子');
      await renderAll();
      setTimeout(() => playDemo(), 400);
    };
    document.getElementById('btn-finish-ok').onclick = () => {
      document.getElementById('finish').classList.remove('show');
      playDemo();
    };
  </script>
</body>
</html>
