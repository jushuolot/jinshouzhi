<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <link rel="stylesheet" href="/jinshouzhi/nuanban/assets/uni.0b746532.css">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <title>暖伴勤工</title>
    <script>
      (function () {
        var p = location.pathname || '';
        var h = location.hash || '';
        // 短入口 #/login → 完整 hash 路由
        if (h === '#/login' || h.indexOf('#/login?') === 0) {
          var hq = h.indexOf('?') >= 0 ? h.slice(h.indexOf('?')) : '';
          location.replace((p || '/') + (location.search || '') + '#/pages/common/login' + hq);
          return;
        }
        // 旧物理路径 /login（无 #）→ 短 hash 入口
        if (p === '/login' || p.indexOf('/login/') === 0) {
          var pq = location.search || '';
          location.replace('/#/login' + pq);
          return;
        }
        // 本地 dev：卸载旧项目（如金手指）遗留的 Service Worker，避免仍缓存 /login
        if (
          (location.hostname === 'localhost' || location.hostname === '127.0.0.1') &&
          navigator.serviceWorker &&
          navigator.serviceWorker.getRegistrations
        ) {
          navigator.serviceWorker.getRegistrations().then(function (regs) {
            regs.forEach(function (r) {
              r.unregister();
            });
          });
        }
      })();
    </script>
    <script type="module" crossorigin src="/jinshouzhi/nuanban/assets/index-DaqgWErz.js"></script>
    <link rel="stylesheet" crossorigin href="/jinshouzhi/nuanban/assets/index-D3PWmY2n.css">
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
