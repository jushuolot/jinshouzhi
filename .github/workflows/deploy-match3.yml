# 将 match3-game/ 静态站点发布到 GitHub Pages
name: Deploy match3 (GitHub Pages)

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]
    paths:
      - "match3-game/**"
      - ".github/workflows/deploy-match3.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-match3
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: match3-game
      - id: deployment
        uses: actions/deploy-pages@v4
