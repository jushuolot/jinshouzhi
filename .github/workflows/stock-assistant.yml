name: stock-assistant

on:
  push:
    paths:
      - "stock-assistant/**"
      - ".github/workflows/stock-assistant.yml"
  pull_request:
    paths:
      - "stock-assistant/**"
      - ".github/workflows/stock-assistant.yml"

defaults:
  run:
    working-directory: stock-assistant

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: stock-assistant/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Cloud preflight
        run: python3 scripts/cloud_preflight.py
      - name: Unit tests
        run: python3 -m unittest discover -s tests -q
