name: Nuanban GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'nuanban_github/**'
      - '.github/workflows/nuanban-github-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nuanban-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: nuanban_github/packages/miniapp/package.json

      - name: Install & build H5
        working-directory: nuanban_github/packages/miniapp
        timeout-minutes: 20
        env:
          VITE_BASE: /${{ vars.GITHUB_REPO || 'jinshouzhi' }}/nuanban/
          VITE_RELEASE_CHANNEL: release
          VITE_API_BASE_URL: ${{ vars.NUANBAN_FORMAL_API_URL || 'http://101.200.128.82/api' }}
          # 限制 uni/vite 并行编译，避免 Actions 与本地多任务同时跑满 CPU
          NODE_OPTIONS: --max-old-space-size=4096
        run: |
          npm install --prefer-offline --no-audit --no-fund
          npm run build:h5

      - name: Publish to docs/ (GitHub Pages /docs)
        run: |
          rm -rf docs/nuanban
          mkdir -p docs/nuanban
          cp -r nuanban_github/packages/miniapp/dist/build/h5/* docs/nuanban/
          printf '%s\n' '<!DOCTYPE html><meta charset="utf-8"><meta http-equiv="refresh" content="0;url=nuanban/#/pages/common/launch"><title>暖伴勤工</title>' > docs/index.html
          touch docs/.nojekyll

      - name: Commit & push docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/nuanban docs/index.html docs/.nojekyll
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "deploy(nuanban): update GitHub Pages [skip ci]"
          git push
