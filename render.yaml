# 金手指公网部署 Blueprint（Render.com）
# 用法：Render Dashboard → New → Blueprint → 选择本仓库 → 导入此文件
# Codespaces 仍适合临时演示；Render 适合需要固定 HTTPS 网址的场景
services:
  - type: web
    name: jinshouzhi
    runtime: node
    plan: free
    buildCommand: npm run build:deploy
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production

  # 暖伴勤工 PocketBase API（见 nuanban_github/docs/GITHUB_DEMO.md）
  - type: web
    name: nuanban-demo
    runtime: docker
    plan: free
    dockerfilePath: ./nuanban_github/packages/pocketbase/Dockerfile
    dockerContext: ./nuanban_github/packages/pocketbase
    healthCheckPath: /api/health
