# 【可选附录 · 不需要】金手指推荐仅用 GitHub Codespaces，不必配置 Render。
# 若仍要公网部署，可在 render.com 连接仓库后导入本 Blueprint（非主流程）。
services:
  - type: web
    name: jinshouzhi
    runtime: node
    plan: free
    buildCommand: npm run build:deploy
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
